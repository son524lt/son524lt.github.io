<!DOCTYPE html>
<html lang="vi" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>404 Error</title>
    <link rel="stylesheet" href="/css/master.css">
  </head>
  <style media="screen">
    body {
      background-image: url(/img.jpg);
      background-repeat: no-repeat;
      background-position: top;
      background-size: cover;
      background-color: black;
    }
    h1 {
      color: white;
    }
    h2 {
      color: red;
      text-align: center;
      text-shadow: 0px 0px 5px #000;
    }
  </style>
  <body>
    <h1>404 - Not Found</h1>
    <h2>This page doesn't exist or has been removed.</h2>
    <div class="button">
      <p class="go" onclick="goBack()">Previous Page</p>
      <a class="go" onclick="home()">Home Page </a>
    </div>

    <script>
    function goBack() {
    window.history.go(-1);
  };
    function home() {
      window.location.assign("/")
    }
    </script>

  </body>
</html>

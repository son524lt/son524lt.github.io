<!DOCTYPE html>
<html lang="vi" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Giải hệ phương trình bậc nhất hai ẩn</title>
    <link rel="stylesheet" href="../counting/master.css">
    <link rel="stylesheet" href="./master.css">
  </head>
  <body>
    <h1>Giải hệ phương trình bậc nhất hai ẩn</h1>
    <h2>Điền hệ số cho hệ phương trình</h2>
    <form onsubmit="return cal()">
      <div id="first" class="pt">
        <div class="block">
          <p>Tử số:</p>
          <p>Mẫu số:</p>
        </div>
        <div class="block">
          <input id="a1t" type="number" name="a1t"> <p class="an"> x + </p>
          <input id="a1m" class="m" type="number" name="a1m" value="1">
        </div>
        <div class="block">
          <input id="b1t" type="number" name="b1t"> <p class="an"> y = </p>
          <input id="b1m" class="m" type="number" name="b1m" value="1">
        </div>
        <div class="block">
          <input id="c1t" type="number" name="c1t">
          <input id="c1m" class="m" type="number" name="c1m" value="1">
        </div>
      </div>
      <div id="second" class="pt">
        <div class="block">
          <p>Tử số:</p>
          <p>Mẫu số:</p>
        </div>
        <div class="block">
          <input id="a2t" type="number" name="a2t"> <p class="an"> x + </p>
          <input id="a2m" class="m" type="number" name="a2m" value="1">
        </div>
        <div class="block">
          <input id="b2t" type="number" name="b2t"> <p class="an"> y = </p>
          <input id="b2m" class="m" type="number" name="b2m" value="1">
        </div>
        <div class="block">
          <input id="c2t" type="number" name="c2t">
          <input id="c2m" class="m" type="number" name="c2m" value="1">
        </div>
      </div>
      <br>
      <input class="show" type="submit" value="Giải">
    </form>
  </body>
</html>

<!DOCTYPE html>
<html lang="vi" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Thuật toán sắp xếp</title>
    <link rel="stylesheet" href="../counting/master.css">
  </head>
  <body>
    <h2>Thêm số hạng cho dãy</h2>
    <form onsubmit="return add()">
      <input id="num" name="id" type="number" value="">
      <input class="show" type="submit" value="Thêm">
    </form>
    <button class="hide" id="appear1" type="button" onclick="del1()">Xóa số đầu</button>
    <button class="hide" id="appear2" type="button" onclick="del2()">Xóa số cuối</button>
    <h3>Dãy số đã điền:<p id="str">(chưa có số)</p></h3>
    <button class="show" type="button" onclick="sort()">Sắp xếp</button>
    <h3 id="kq"></h3>
    <button class="hide" id="appear3" type="button" onclick="del3()">Xóa kết quả</button>
  </body>
  <script src="./main.js"></script>
</html>
